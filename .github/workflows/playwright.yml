name: Playwright Tests

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      profile:
        description: Test profile to run
        type: choice
        required: true
        default: full
        options:
          - full
          - smoke
      browser:
        description: Browser project to run
        type: choice
        required: true
        default: all
        options:
          - chromium
          - firefox
          - webkit
          - all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      TEST_PROFILE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.profile || 'full' }}
      BROWSER_PROJECT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.browser || 'all' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install selected Playwright browser
        if: env.BROWSER_PROJECT != 'all'
        run: npx playwright install --with-deps ${BROWSER_PROJECT}

      - name: Install all Playwright browsers
        if: env.BROWSER_PROJECT == 'all'
        run: npx playwright install --with-deps

      - name: Run tests on selected browser
        if: env.BROWSER_PROJECT != 'all'
        run: |
          echo "Running profile=${TEST_PROFILE} on browser=${BROWSER_PROJECT}"
          npm run test:${TEST_PROFILE} -- --project=${BROWSER_PROJECT}

      - name: Run tests on all browsers
        if: env.BROWSER_PROJECT == 'all'
        run: |
          echo "Running profile=${TEST_PROFILE} on all browsers"
          npm run test:${TEST_PROFILE}

      - name: Prepare Playwright report for Pages
        if: always()
        run: |
          mkdir -p playwright-report-pages
          cp -r playwright-report/. playwright-report-pages/

      - name: Upload Playwright report pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report-pages

      - name: Upload raw test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 30

  deploy-playwright-report-pages:
    needs: test
    if: ${{ always() && github.event_name != 'pull_request' && needs.test.result != 'skipped' && (github.ref_name == 'main' || github.ref_name == 'master') }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy Playwright report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add hosted Playwright report quick link
        run: |
          echo "## Hosted Playwright report" >> $GITHUB_STEP_SUMMARY
          echo "[Open HTML report](${{ steps.deployment.outputs.page_url }})" >> $GITHUB_STEP_SUMMARY
